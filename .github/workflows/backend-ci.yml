name: Backend CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bgsc
          POSTGRES_PASSWORD: bgsc_pass
          POSTGRES_DB: bgsc_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Run tests
        working-directory: backend
        run: npm run test:cov    # generates  report too
        env:
          DATABASE_URL: postgresql://bgsc:bgsc_pass@localhost:5432/bgsc_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_do_not_use_in_prod

      - name: Check coverage threshold (>50%)
        working-directory: backend
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e \
            "const d=require('fs').readFileSync('/dev/stdin','utf8'); \
             const j=JSON.parse(d); \
             console.log(j.total.lines.pct)")
          echo "Coverage: $COVERAGE%"
          node -e "if($COVERAGE < 50) { console.error('Coverage below 50%!'); process.exit(1); }"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test   # only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false          # just build, don't push on PRs
          tags: bgsc-backend:pr-${{ github.event.number }}
