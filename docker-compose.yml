version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bgsc
      POSTGRES_PASSWORD: bgsc_pass
      POSTGRES_DB: bgsc_dev
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://bgsc:bgsc_pass@postgres:5432/bgsc_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_prod

  user-service:
    build:
      context: ./backend
      dockerfile: apps/user-service/Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://bgsc:bgsc_pass@postgres:5432/bgsc_dev
      JWT_SECRET: dev_secret_change_in_prod
      PORT: 3001
